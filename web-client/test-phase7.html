<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LispIM Phase 7 API 测试</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #00d9ff; text-align: center; }
    h2 { color: #00d9ff; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .test-section {
      background: #16213e;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    .test-item {
      background: #0f3460;
      border-radius: 6px;
      padding: 15px;
      margin: 10px 0;
    }
    .test-item h3 { margin: 0 0 10px 0; color: #fff; }
    .test-item p { margin: 5px 0; color: #aaa; }
    .btn {
      background: #00d9ff;
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }
    .btn:hover { background: #00b8d4; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .result {
      background: #0a0a0a;
      border-radius: 4px;
      padding: 10px;
      margin-top: 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success { color: #00ff88; }
    .error { color: #ff4444; }
    .info { color: #8888ff; }
    input, select {
      background: #0f3460;
      border: 1px solid #333;
      color: #fff;
      padding: 8px;
      border-radius: 4px;
      margin: 5px;
    }
    .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .status.ok { background: #00ff88; }
    .status.fail { background: #ff4444; }
    .status.pending { background: #ffaa00; }
  </style>
</head>
<body>
  <h1>LispIM Phase 7 API 测试工具</h1>

  <!-- 配置区域 -->
  <div class="test-section">
    <h2>📋 配置</h2>
    <div class="flex">
      <label>API 服务器地址：</label>
      <input type="text" id="apiUrl" value="http://localhost:3000" style="width: 250px;">
    </div>
    <div class="flex">
      <label>Token：</label>
      <input type="text" id="authToken" placeholder="输入认证 Token" style="width: 400px;">
      <button class="btn" onclick="saveConfig()">保存</button>
    </div>
  </div>

  <!-- 登录测试 -->
  <div class="test-section">
    <h2>🔐 认证测试</h2>
    <div class="test-item">
      <h3>登录</h3>
      <div class="flex">
        <input type="text" id="username" placeholder="用户名" value="testuser">
        <input type="password" id="password" placeholder="密码" value="password123">
        <button class="btn" onclick="testLogin()">测试登录</button>
      </div>
      <div id="loginResult" class="result" style="display: none;"></div>
    </div>
  </div>

  <!-- 全文搜索测试 -->
  <div class="test-section">
    <h2>🔍 全文搜索 API 测试</h2>
    <div class="test-item">
      <h3>搜索消息</h3>
      <div class="flex">
        <input type="text" id="searchQuery" placeholder="搜索关键词" value="测试" style="width: 200px;">
        <select id="searchType">
          <option value="all">全部</option>
          <option value="messages">消息</option>
          <option value="contacts">联系人</option>
          <option value="conversations">会话</option>
        </select>
        <button class="btn" onclick="testSearch()">执行搜索</button>
      </div>
      <div id="searchResult" class="result" style="display: none;"></div>
    </div>
  </div>

  <!-- 消息回复测试 -->
  <div class="test-section">
    <h2>💬 消息回复 API 测试</h2>
    <div class="test-item">
      <h3>获取消息回复列表</h3>
      <div class="flex">
        <input type="text" id="replyMessageId" placeholder="消息 ID" style="width: 300px;">
        <button class="btn" onclick="testGetReplies()">获取回复</button>
      </div>
      <div id="repliesResult" class="result" style="display: none;"></div>
    </div>

    <div class="test-item">
      <h3>获取回复链</h3>
      <div class="flex">
        <input type="text" id="chainMessageId" placeholder="消息 ID" style="width: 300px;">
        <button class="btn" onclick="testGetReplyChain()">获取回复链</button>
      </div>
      <div id="chainResult" class="result" style="display: none;"></div>
    </div>

    <div class="test-item">
      <h3>获取线程信息</h3>
      <div class="flex">
        <input type="text" id="threadRootId" placeholder="根消息 ID" style="width: 300px;">
        <button class="btn" onclick="testGetThread()">获取线程</button>
      </div>
      <div id="threadResult" class="result" style="display: none;"></div>
    </div>

    <div class="test-item">
      <h3>发送回复消息</h3>
      <div class="flex">
        <input type="text" id="replyToId" placeholder="回复的目标消息 ID" style="width: 200px;">
        <input type="text" id="replyConversationId" placeholder="会话 ID" value="1" style="width: 100px;">
        <input type="text" id="replyContent" placeholder="回复内容" value="这是测试回复" style="width: 200px;">
        <button class="btn" onclick="testSendReply()">发送回复</button>
      </div>
      <div id="sendReplyResult" class="result" style="display: none;"></div>
    </div>
  </div>

  <!-- 批量测试 -->
  <div class="test-section">
    <h2>⚡ 批量测试</h2>
    <button class="btn" onclick="runAllTests()">运行所有测试</button>
    <div id="batchResult" class="result" style="display: none;"></div>
  </div>

  <script>
    // 配置
    let API_URL = localStorage.getItem('lispim_api_url') || 'http://localhost:3000';
    let AUTH_TOKEN = localStorage.getItem('lispim_token') || '';

    document.getElementById('apiUrl').value = API_URL;
    document.getElementById('authToken').value = AUTH_TOKEN;

    function saveConfig() {
      API_URL = document.getElementById('apiUrl').value;
      AUTH_TOKEN = document.getElementById('authToken').value;
      localStorage.setItem('lispim_api_url', API_URL);
      localStorage.setItem('lispim_token', AUTH_TOKEN);
      showResult('config', '配置已保存', 'success');
      alert('配置已保存！');
    }

    function showResult(elementId, data, type = 'info') {
      const el = document.getElementById(elementId + 'Result');
      el.style.display = 'block';
      el.className = 'result ' + type;
      if (typeof data === 'object') {
        el.textContent = JSON.stringify(data, null, 2);
      } else {
        el.textContent = data;
      }
    }

    async function apiRequest(endpoint, options = {}) {
      const url = `${API_URL}${endpoint}`;
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };
      if (AUTH_TOKEN) {
        headers['Authorization'] = `Bearer ${AUTH_TOKEN}`;
      }
      const response = await fetch(url, { ...options, headers });
      return response.json();
    }

    // 登录测试
    async function testLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      try {
        const result = await apiRequest('/api/v1/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });
        if (result.success && result.data) {
          AUTH_TOKEN = result.data.token;
          localStorage.setItem('lispim_token', AUTH_TOKEN);
          document.getElementById('authToken').value = AUTH_TOKEN;
          showResult('login', result, 'success');
        } else {
          showResult('login', result, 'error');
        }
      } catch (e) {
        showResult('login', { error: e.message }, 'error');
      }
    }

    // 搜索测试
    async function testSearch() {
      const query = document.getElementById('searchQuery').value;
      const type = document.getElementById('searchType').value;
      try {
        const result = await apiRequest(`/api/v1/search?q=${encodeURIComponent(query)}&type=${type}`);
        showResult('search', result, result.success ? 'success' : 'error');
      } catch (e) {
        showResult('search', { error: e.message }, 'error');
      }
    }

    // 获取回复列表
    async function testGetReplies() {
      const messageId = document.getElementById('replyMessageId').value;
      if (!messageId) { alert('请输入消息 ID'); return; }
      try {
        const result = await apiRequest(`/api/v1/messages/${messageId}/replies`);
        showResult('replies', result, result.success ? 'success' : 'error');
      } catch (e) {
        showResult('replies', { error: e.message }, 'error');
      }
    }

    // 获取回复链
    async function testGetReplyChain() {
      const messageId = document.getElementById('chainMessageId').value;
      if (!messageId) { alert('请输入消息 ID'); return; }
      try {
        const result = await apiRequest(`/api/v1/messages/${messageId}/reply-chain`);
        showResult('chain', result, result.success ? 'success' : 'error');
      } catch (e) {
        showResult('chain', { error: e.message }, 'error');
      }
    }

    // 获取线程
    async function testGetThread() {
      const rootId = document.getElementById('threadRootId').value;
      if (!rootId) { alert('请输入根消息 ID'); return; }
      try {
        const result = await apiRequest(`/api/v1/threads/${rootId}`);
        showResult('thread', result, result.success ? 'success' : 'error');
      } catch (e) {
        showResult('thread', { error: e.message }, 'error');
      }
    }

    // 发送回复
    async function testSendReply() {
      const replyToId = document.getElementById('replyToId').value;
      const conversationId = document.getElementById('replyConversationId').value;
      const content = document.getElementById('replyContent').value;
      if (!replyToId || !content) { alert('请填写完整信息'); return; }
      try {
        const result = await apiRequest(`/api/v1/messages/${replyToId}/reply`, {
          method: 'POST',
          body: JSON.stringify({ content, conversationId })
        });
        showResult('sendReply', result, result.success ? 'success' : 'error');
      } catch (e) {
        showResult('sendReply', { error: e.message }, 'error');
      }
    }

    // 批量测试
    async function runAllTests() {
      const results = [];
      results.push('=== Phase 7 API 批量测试 ===\n');

      // 测试搜索 API
      results.push('\n[1] 测试全文搜索 API...');
      try {
        const searchResult = await apiRequest('/api/v1/search?q=test&type=all');
        results.push(searchResult.success ? '✓ PASS' : `✗ FAIL: ${JSON.stringify(searchResult)}`);
      } catch (e) {
        results.push(`✗ FAIL: ${e.message}`);
      }

      // 测试回复 API（需要有效的消息 ID）
      results.push('\n[2] 测试消息回复 API...');
      results.push('  需要有效的消息 ID，请手动测试');

      const batchEl = document.getElementById('batchResult');
      batchEl.style.display = 'block';
      batchEl.className = 'result info';
      batchEl.textContent = results.join('\n');
    }
  </script>
</body>
</html>
